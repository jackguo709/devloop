    <text y="398"><tspan x="195" fill="#a6adc8">users. Ask what they'd break if you disappeared.</tspan></text>

    <!-- Growth Systems -->
    <text y="422"><tspan x="23" fill="#cdd6f4">Growth Systems (2)</tspan><tspan x="195" fill="#a6adc8">Organic search brings ~12 signups/week. Steady but no</tspan></text>
    <text y="438"><tspan x="195" fill="#a6adc8">compounding loops yet. Next: add in-app referrals</tspan></text>
    <text y="454"><tspan x="195" fill="#a6adc8">("invite your team") and start tracking LTV:CAC.</tspan></text>

    <text y="480" fill="#585b70"><tspan x="23">...</tspan></text>

    <!-- Bottom border -->
    <text y="508" fill="#585b70">╚═════════════════════════════════════════════════════════════════════════════════╝</text>

