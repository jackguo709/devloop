  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="64" cy="19" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="430" y="24" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086">Claude Code</text>

  <!-- Terminal content -->
  <g transform="translate(28, 58)" font-family="'SFMono-Regular', 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="13">

