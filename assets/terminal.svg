    <text y="174"><tspan x="23" fill="#cdd6f4">Product Taste</tspan><tspan x="148" fill="#a6e3a1">██████████</tspan><tspan fill="#45475a">░░░░░░░░</tspan><tspan x="304" fill="#f9e2af">2.8</tspan></text>
    <text y="190"><tspan x="23" fill="#cdd6f4">Directing AI</tspan><tspan x="148" fill="#a6e3a1">████████████████</tspan><tspan fill="#45475a">░░</tspan><tspan x="304" fill="#f9e2af">4.5</tspan></text>
    <text y="206"><tspan x="23" fill="#cdd6f4">Agent Fluency</tspan><tspan x="148" fill="#a6e3a1">██████████████</tspan><tspan fill="#45475a">░░░░</tspan><tspan x="304" fill="#f9e2af">3.8</tspan></text>
    <text y="222"><tspan x="23" fill="#cdd6f4">Verification</tspan><tspan x="148" fill="#a6e3a1">█████████</tspan><tspan fill="#45475a">░░░░░░░░░</tspan><tspan x="304" fill="#f9e2af">2.5</tspan></text>
    <text y="238"><tspan x="23" fill="#cdd6f4">Distribution</tspan><tspan x="148" fill="#a6e3a1">███████</tspan><tspan fill="#45475a">░░░░░░░░░░░</tspan><tspan x="304" fill="#f9e2af">2.0</tspan></text>
    <text y="254"><tspan x="23" fill="#cdd6f4">Business</tspan><tspan x="148" fill="#a6e3a1">██████</tspan><tspan fill="#45475a">░░░░░░░░░░░░</tspan><tspan x="304" fill="#f9e2af">1.8</tspan></text>

    <!-- DISTRIBUTION breakdown -->
    <text y="284" fill="#cba6f7"><tspan x="23">DISTRIBUTION (2.0)</tspan></text>

    <!-- Web Presence -->
    <text y="310"><tspan x="23" fill="#cdd6f4">Web Presence (3)</tspan><tspan x="195" fill="#a6adc8">nimbus.dev landing page converts at 4%. Shows up for</tspan></text>
