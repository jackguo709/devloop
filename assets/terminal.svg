<svg xmlns="http://www.w3.org/2000/svg" width="860" height="584" viewBox="0 0 860 584">
  <!-- Terminal window -->
  <rect width="860" height="584" rx="10" fill="#1e1e2e" stroke="#2a2b3d" stroke-width="0.5"/>

  <!-- Title bar -->
  <rect width="860" height="38" rx="10" fill="#181825"/>
  <rect y="28" width="860" height="10" fill="#181825"/>

  <!-- Traffic lights -->
